AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Vani-Chitra Backend Pipeline

Resources:
  VaniChitraInputBucket:
    Type: AWS::S3::Bucket

  VaniChitraOutputBucket:
    Type: AWS::S3::Bucket

  DocumentProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: processor.handler
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref VaniChitraOutputBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref VaniChitraInputBucket
        - S3CrudPolicy:
            BucketName: !Ref VaniChitraOutputBucket
        - Statement:
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
                - bedrock:InvokeModel
                - polly:SynthesizeSpeech
              Resource: '*'
      Events:
        FileUpload:
          Type: S3
          Properties:
            Bucket: !Ref VaniChitraInputBucket
            Events: s3:ObjectCreated:*